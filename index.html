<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barber Shop For Reservation</title>

<style>
:root{
--bg:#0f0f0f;
--card:#1f1f1f;
--text:white;
--accent:gold;
}
.light{
--bg:#f4f4f4;
--card:white;
--text:#111;
--accent:#222;
}
body{
font-family:Arial;
background:var(--bg);
color:var(--text);
margin:0;
text-align:center;
transition:0.4s;
}
.screen{
display:none;
padding:20px;
animation:fade .4s;
}
.active{
display:block;
}
h1{color:var(--accent);}
button{
padding:8px 16px;
margin:6px;
border:none;
border-radius:8px;
cursor:pointer;
background:var(--accent);
font-weight:bold;
transition:.3s;
}
button:hover{transform:scale(1.05);}
input{
width:220px;
padding:10px;
margin:8px;
border:none;
border-radius:8px;
outline:none;
transition:.3s;
}
input:focus{
box-shadow:0 0 10px var(--accent);
transform:scale(1.03);
}
.barbers{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin:20px;
}
.barber{
cursor:pointer;
background:var(--card);
padding:12px;
border-radius:12px;
transition:.3s;
}
.barber:hover{transform:scale(1.07);}
.barber img{
width:80px;
height:80px;
object-fit:cover;
border-radius:50%;
border:3px solid var(--accent);
}
.booking{
background:var(--card);
margin:10px auto;
padding:12px;
border-radius:10px;
width:280px;
animation:fade .5s;
}
.status-wait{color:orange}
.status-accepted{color:lime}
.status-rejected{color:red}
.msg{
margin:10px auto;
padding:10px;
width:280px;
border-radius:8px;
background:var(--accent);
color:#111;
font-weight:bold;
animation:fade 0.5s;
}
footer{
margin-top:30px;
padding:20px;
font-size:14px;
opacity:.7;
}
@keyframes fade{
from{opacity:0;transform:translateY(-10px);}
to{opacity:1;}
}
</style>
</head>
<body>

<button onclick="toggleMode()">🌙 / ☀️</button>

<!-- الصفحة الرئيسية -->
<div id="home" class="screen active">
<h1>💈 BARBER SHOP FOR RESERVATION 💈</h1>
<button onclick="show('customer')">أنا زبون 🦰  </button>
<button onclick="show('login')">أنا حلاق 💈</button>
</div>

<!-- صفحة الزبون -->
<div id="customer" class="screen">
<h2>حجز موعد</h2>
<input id="name" placeholder="الاسم">
<div>
<span>+213</span>
<input id="phone" maxlength="9" placeholder="رقم الهاتف">
</div>

<h3>اختر الحلاق</h3>
<div class="barbers">
<div class="barber" onclick="selectBarber('KHIRE_EDDINE RJ7')">
<img src="khireeddine2.jpg"><p>KHIRE_EDDINE RJ7</p>
</div>
<div class="barber" onclick="selectBarber('NADIR')">
<img src="nadir.jpg"><p>NADIR_M</p>
</div>
<div class="barber" onclick="selectBarber('OUSSAMA')">
<img src="oussama.jpg"><p>OUSSAMA_H</p>
</div>
<div class="barber" onclick="selectBarber('ZAKARIA')">
<img src="zakaria.jpg"><p>ZAKARIA_B</p>
</div>
</div>

<input type="date" id="date">
<input type="time" id="time">
<br>
<button onclick="book()">حجز</button>
<p id="msg"></p>
<button onclick="goBack()">رجوع</button>
<button onclick="show('myBookings')">حجوزاتي</button>
</div>

<!-- حجوزات الزبون -->
<div id="myBookings" class="screen">
<h2>حجوزاتي</h2>
<div>
<span>+213</span>
<input id="searchPhone" maxlength="9" placeholder="ادخل رقم هاتفك">
<button onclick="findBookings()">بحث</button>
<button onclick="clearAllBookings()">مسح كل الحجوزات</button>
</div>
<div id="myList"></div>
<p id="noBookingMsg" style="color:red;font-weight:bold;"></p>
<button onclick="goBack()">رجوع</button>
</div>

<!-- تسجيل دخول الحلاق -->
<div id="login" class="screen">
<h2>دخول الحلاق</h2>
<input id="user" placeholder="اسم المستخدم">
<input id="pass" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<p id="loginMsg"></p>
<button onclick="goBack()">رجوع</button>
</div>

<!-- لوحة الحلاق -->
<div id="admin" class="screen">
<h2>الحجوزات</h2>
<div id="list"></div>
<div id="actionMsg" class="msg" style="display:none;"></div>
<button onclick="clearAllBookings()">مسح كل الحجوزات</button>
<button onclick="logoutAdmin()">خروج</button>
</div>

<footer>DEVLOPPED BY KHIREEDDINE_RJX7 2026</footer>

<script>
let selectedBarber=""
let currentBarber=""

const accounts={
"khireeddine":"1234567891011",
"nadir":"12345",
"oussama":"1234567",
"zakaria":"1234567"
}

function toggleMode(){document.body.classList.toggle("light")}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function selectBarber(name){selectedBarber=name;document.getElementById("msg").innerText="الحلاق المختار: "+name;}

function clearCustomerInputs(){
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("date").value="";
document.getElementById("time").value="";
document.getElementById("msg").innerText="";
document.getElementById("noBookingMsg").innerText="";
document.getElementById("myList").innerHTML="";
document.getElementById("searchPhone").value="";
}

function goBack(){
clearCustomerInputs();
document.getElementById("loginMsg").innerText="";
document.getElementById("actionMsg").style.display="none";
show('home');
}

// مسح جميع الحجوزات
function clearAllBookings(){
if(confirm("هل تريد حذف كل الحجوزات والبدء من جديد؟")){
localStorage.removeItem("bookings");
alert("تم مسح كل الحجوزات!");
location.reload();
}
}

function book(){
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let date=document.getElementById("date").value
let time=document.getElementById("time").value

if(!name||!phone||!date||!time||!selectedBarber){document.getElementById("msg").innerText="⚠️ املأ كل البيانات";return}

let selectedDate=new Date(date+" "+time)
let now=new Date()
if((selectedDate-now)/60000<10){document.getElementById("msg").innerText="❌ يجب الحجز قبل 10 دقائق على الأقل";return}

let bookings=JSON.parse(localStorage.getItem("bookings")||"[]")
let exists=bookings.find(b=>b.barber==selectedBarber && b.date==date && b.time==time)
if(exists){document.getElementById("msg").innerText="❌ هذا الوقت محجوز";return}

bookings.push({name,phone:"+213"+phone,barber:selectedBarber,date,time,status:"WAIT"})
localStorage.setItem("bookings",JSON.stringify(bookings))
document.getElementById("msg").innerText="✅ تم ارسال طلب الحجز"
clearCustomerInputs()
}

function login(){
clearCustomerInputs();
let u=document.getElementById("user").value.toLowerCase()
let p=document.getElementById("pass").value
if(accounts[u]==p){currentBarber=u;show("admin");loadBookings()}else{document.getElementById("loginMsg").innerText="❌ معلومات خاطئة"}}

function logoutAdmin(){
currentBarber="";
document.getElementById("user").value="";
document.getElementById("pass").value="";
goBack();
}

function loadBookings(){
let bookings=JSON.parse(localStorage.getItem("bookings")||"[]")
let list=document.getElementById("list")
list.innerHTML=""
bookings.forEach((b,i)=>{
if(b.barber.toLowerCase()==currentBarber){
list.innerHTML+=`<div class="booking"><b>${b.name}</b><br>${b.phone}<br>${b.date} ${b.time}<br>
<button onclick="accept(${i})">قبول</button>
<button onclick="reject(${i})">رفض</button>
<button onclick="deleteBooking(${i})">حذف</button></div>`}})}

function showActionMsg(text){
let m=document.getElementById("actionMsg")
m.innerText=text
m.style.display="block"
setTimeout(()=>{m.style.display="none"},3000)
}

function accept(i){
let bookings=JSON.parse(localStorage.getItem("bookings"))
bookings[i].status="ACCEPTED"
localStorage.setItem("bookings",JSON.stringify(bookings))
showActionMsg("✅ تم قبول حجز "+bookings[i].name)
clearCustomerInputs()
loadBookings()
}

function reject(i){
let bookings=JSON.parse(localStorage.getItem("bookings"))
bookings[i].status="REJECTED"
localStorage.setItem("bookings",JSON.stringify(bookings))
showActionMsg("❌ تم رفض حجز "+bookings[i].name)
clearCustomerInputs()
loadBookings()
}

function deleteBooking(i){
let bookings=JSON.parse(localStorage.getItem("bookings"))
bookings.splice(i,1)
localStorage.setItem("bookings",JSON.stringify(bookings))
loadBookings()
}

// دالة البحث وعرض الحجوزات للزبون مع حالة كل حجز ورسائل واضحة
function findBookings(){
let inputPhone=document.getElementById("searchPhone").value;
document.getElementById("myList").innerHTML="";
document.getElementById("noBookingMsg").innerText="";

if(inputPhone.length!==9){
document.getElementById("noBookingMsg").innerText="⚠️ الرجاء إدخال 9 أرقام صحيحة";
return;
}

let phone="+213"+inputPhone;
let bookings=JSON.parse(localStorage.getItem("bookings")||[]);
let found=false;

bookings.forEach(b=>{
if(b.phone===phone){
found=true;
let statusClass="status-wait", statusText="قيد الانتظار ⏳";
if(b.status==="ACCEPTED"){statusClass="status-accepted"; statusText="مقبول ✅";}
if(b.status==="REJECTED"){statusClass="status-rejected"; statusText="مرفوض ❌";}
document.getElementById("myList").innerHTML+=`<div class="booking">
<b>الحلاق:</b> ${b.barber}<br>
<b>التاريخ والوقت:</b> ${b.date} ${b.time}<br>
<span class="${statusClass}">${statusText}</span>
</div>`;
}
});

if(!found){
document.getElementById("noBookingMsg").innerText="⚠️ لا توجد حجوزات بهذا الرقم";
}
}
</script>

</body>
</html>
